version: 0.2

# CodeBuild buildspec for the live `agentloft-e2e` EKS cluster.
# Pushes images into the `agentloft/*` ECR repos that the cluster's Helm
# release references. Override IMAGE_TAG in the project settings or via the
# `--environment-variables-override` flag on `aws codebuild start-build`.
#
# Sandbox images depend on Go source under `cmd/sandbox-runtime/` and
# `pkg/sandboxruntime/`, so their build context is the repo root.
env:
  variables:
    AWS_DEFAULT_REGION: "us-east-1"
    IMAGE_TAG: "dev"
    ECR_NAMESPACE: "agentloft"

phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPO_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  build:
    commands:
      - echo "Building controller..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/controller:$IMAGE_TAG -f Dockerfile.controller --build-arg VERSION=$IMAGE_TAG .
      - echo "Building router..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/router:$IMAGE_TAG -f Dockerfile.router --build-arg VERSION=$IMAGE_TAG .
      - echo "Building web-ui..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/web-ui:$IMAGE_TAG -f web-ui/Dockerfile web-ui/
      - echo "Building sandbox-general (with in-pod runtime)..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/sandbox-general:$IMAGE_TAG -f images/general-coding/Dockerfile .
      - echo "Building sandbox-claude-code (with in-pod runtime)..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/sandbox-claude-code:$IMAGE_TAG -f images/claude-code/Dockerfile . || true
      - echo "Building sandbox-openclaw (with in-pod runtime)..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/sandbox-openclaw:$IMAGE_TAG -f images/openclaw/Dockerfile . || true
      - echo "Building sandbox-strands-bedrock (with in-pod runtime)..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/sandbox-strands-bedrock:$IMAGE_TAG -f images/strands-bedrock/Dockerfile . || true
      - echo "Building sandbox-langgraph (agent-mode reference)..."
      - docker build -t $REPO_URI/$ECR_NAMESPACE/sandbox-langgraph:$IMAGE_TAG -f images/langgraph/Dockerfile .
  post_build:
    commands:
      - echo "Pushing images..."
      - docker push $REPO_URI/$ECR_NAMESPACE/controller:$IMAGE_TAG
      - docker push $REPO_URI/$ECR_NAMESPACE/router:$IMAGE_TAG
      - docker push $REPO_URI/$ECR_NAMESPACE/web-ui:$IMAGE_TAG
      - docker push $REPO_URI/$ECR_NAMESPACE/sandbox-general:$IMAGE_TAG
      - docker push $REPO_URI/$ECR_NAMESPACE/sandbox-claude-code:$IMAGE_TAG || true
      - docker push $REPO_URI/$ECR_NAMESPACE/sandbox-openclaw:$IMAGE_TAG || true
      - docker push $REPO_URI/$ECR_NAMESPACE/sandbox-strands-bedrock:$IMAGE_TAG || true
      - docker push $REPO_URI/$ECR_NAMESPACE/sandbox-langgraph:$IMAGE_TAG
      - echo "Build complete. Tagged $IMAGE_TAG in $ECR_NAMESPACE/* on $REPO_URI."
