run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - gofmt
    - goimports
    - revive
    - gocritic
    - gosec
    - prealloc
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/agenttier/agenttier
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: test/
      linters:
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
