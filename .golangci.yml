run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - unused
    # Style (minimal)
    - gofmt
    - goimports
    - misspell
    - unconvert
    # Security
    - gosec

linters-settings:
  goimports:
    local-prefixes: github.com/agenttier/agenttier
  gosec:
    # G115: integer overflow conversion — we enforce bounds at protocol boundaries;
    # the residual int->uint{16} casts are on values clamped by the terminal client.
    excludes:
      - G115

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: test/
      linters:
        - gosec
  max-issues-per-linter: 0
  max-same-issues: 0
