[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agenttier"
version = "0.1.0"
description = "Python SDK for AgentTier — manage isolated AI agent sandboxes on Kubernetes"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "AgentTier Authors" },
]
keywords = ["kubernetes", "sandbox", "ai-agents", "developer-tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/agenttier/python-sdk"
Documentation = "https://docs.agenttier.io/sdk"
Repository = "https://github.com/agenttier/python-sdk"
Issues = "https://github.com/agenttier/python-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/agenttier"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.mypy]
python_version = "3.10"
strict = true
