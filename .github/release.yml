# Configuration for auto-generated release notes.
# See https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
# Categories match the Keep-a-Changelog groupings we use in CHANGELOG.md.
changelog:
  exclude:
    labels:
      - skip-changelog
      - duplicate
      - invalid
      - wontfix
    authors:
      - dependabot
  categories:
    - title: Breaking changes
      labels:
        - breaking
        - breaking-change
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Dependencies
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
