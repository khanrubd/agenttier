name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io/agenttier

jobs:
  # ------------------------------------------------------------------
  # Build and publish container images to ghcr.io.
  # A matrix drives one buildx job per image so the 6 images build in
  # parallel and any single failure surfaces immediately.
  # ------------------------------------------------------------------
  release-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing via GitHub's OIDC provider
      # (no long-lived keys; the Actions runner's identity is the signer).
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: controller
            context: .
            dockerfile: Dockerfile.controller
          - name: router
            context: .
            dockerfile: Dockerfile.router
          - name: web-ui
            context: web-ui
            dockerfile: web-ui/Dockerfile
          - name: sandbox-general
            context: images/general-coding
            dockerfile: images/general-coding/Dockerfile
          - name: sandbox-claude-code
            context: images/claude-code
            dockerfile: images/claude-code/Dockerfile
          - name: sandbox-minimal
            context: images/minimal
            dockerfile: images/minimal/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          # Only mark the image `:latest` on GA tags (no "-rc", "-beta", etc.)
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "TAG_LATEST=true" >> "$GITHUB_OUTPUT"
          else
            echo "TAG_LATEST=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          # We only tag `:latest` on GA; release candidates stay versioned.
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.version.outputs.TAG_LATEST == 'true' && format('{0}/{1}:latest', env.REGISTRY, matrix.name) || '' }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}

      # ----------------------------------------------------------------
      # Supply-chain hardening: keyless cosign signature + syft SBOM.
      # Signatures and SBOMs are published as OCI artifacts alongside the
      # image in the same ghcr.io repository, so consumers can verify with:
      #
      #   cosign verify --certificate-identity-regexp \
      #     'https://github.com/agenttier/agenttier/.*' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      #     ghcr.io/agenttier/<image>:<version>
      #
      # and pull the SBOM with:
      #   cosign download sbom ghcr.io/agenttier/<image>:<version>
      # ----------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Sign image with cosign (keyless, GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE: ${{ env.REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate and attach SBOM
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ matrix.name }}:${{ steps.version.outputs.VERSION }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          # SPDX is the most widely-recognized SBOM format in the
          # compliance world; we also attach CycloneDX because Trivy
          # and several other scanners prefer it.
          syft "${IMAGE}@${DIGEST}" -o spdx-json=sbom.spdx.json
          syft "${IMAGE}@${DIGEST}" -o cyclonedx-json=sbom.cdx.json
          cosign attach sbom --sbom sbom.spdx.json "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate sbom.spdx.json --type spdx "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx "${IMAGE}@${DIGEST}"

  # ------------------------------------------------------------------
  # Package the Helm chart, push it to the `gh-pages` branch, and
  # regenerate the `index.yaml` so users can do:
  #   helm repo add agenttier https://agenttier.github.io/agenttier
  #   helm install agenttier agenttier/agenttier
  # ------------------------------------------------------------------
  release-helm:
    runs-on: ubuntu-latest
    needs: release-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Package chart
        run: |
          mkdir -p /tmp/charts
          helm package helm/agenttier/ \
            --version "${{ steps.version.outputs.VERSION }}" \
            --app-version "${{ steps.version.outputs.VERSION }}" \
            --destination /tmp/charts
      - name: Upload chart as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/charts/*.tgz
      - name: Publish chart to gh-pages
        run: |
          # Use a throwaway worktree so we don't disturb the tag checkout.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          # If gh-pages doesn't exist yet, create an empty branch.
          if ! git show-ref --verify --quiet refs/heads/gh-pages; then
            git worktree add --detach /tmp/pages
            cd /tmp/pages
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          else
            git worktree add /tmp/pages gh-pages
            cd /tmp/pages
          fi

          # Charts live under /charts/ so the root of gh-pages is free for
          # the MkDocs site. Old consumers of the legacy root-level repo URL
          # continue to work because we keep the root-level index.yaml too
          # (the release-docs job replaces the site but preserves the chart
          # assets).
          mkdir -p charts
          cp /tmp/charts/*.tgz charts/
          helm repo index charts --url "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/charts"

          # Also publish a copy at the old root path so existing users don't
          # break. Remove this block once the docs site migration is
          # announced (task 8.8).
          cp /tmp/charts/*.tgz .
          helm repo index . --url "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"

          git add .
          # Nothing to commit if the chart version is already published.
          if git diff --cached --quiet; then
            echo "No chart changes to publish."
            exit 0
          fi
          git commit -m "Publish chart v${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Build the MkDocs site and deploy to gh-pages, preserving the
  # chart tarballs + index.yaml at the paths release-helm publishes.
  # Must run after release-helm because both jobs write to gh-pages.
  # ------------------------------------------------------------------
  release-docs:
    runs-on: ubuntu-latest
    needs: release-helm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material
      - name: Build site
        working-directory: docs
        run: mkdocs build --strict --site-dir /tmp/site
      - name: Deploy to gh-pages
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages
          git worktree add /tmp/pages gh-pages
          cd /tmp/pages

          # Preserve every file that belongs to Helm — chart tarballs at
          # the root (for backward compatibility) and under /charts/, plus
          # both index.yaml locations.
          mkdir -p /tmp/preserved/charts
          cp charts/*.tgz /tmp/preserved/charts/ 2>/dev/null || true
          cp charts/index.yaml /tmp/preserved/charts/ 2>/dev/null || true
          cp *.tgz /tmp/preserved/ 2>/dev/null || true
          cp index.yaml /tmp/preserved/legacy-index.yaml 2>/dev/null || true

          # Wipe everything else (stale docs files) and replace with the
          # freshly-built site.
          find . -maxdepth 1 \
            -not -name '.' \
            -not -name '.git' \
            -not -name 'charts' \
            -exec rm -rf {} + 2>/dev/null || true
          rm -rf charts
          cp -r /tmp/site/. .

          # Mkdocs Material output includes asset paths starting with
          # underscore directories (`_mkdocs/`, `assets/`, etc.). GitHub
          # Pages runs Jekyll by default and hides anything starting with
          # `_`, which would break search + theme assets. The `.nojekyll`
          # marker disables that.
          touch .nojekyll

          # Restore the Helm bits. The mkdocs build may have written its
          # own index.yaml; we do not let it clobber the Helm one.
          mkdir -p charts
          cp /tmp/preserved/charts/*.tgz charts/ 2>/dev/null || true
          cp /tmp/preserved/charts/index.yaml charts/ 2>/dev/null || true
          cp /tmp/preserved/*.tgz . 2>/dev/null || true
          if [ -f /tmp/preserved/legacy-index.yaml ]; then
            cp /tmp/preserved/legacy-index.yaml index.yaml
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No docs changes."
            exit 0
          fi
          git commit -m "Publish docs for ${GITHUB_REF#refs/tags/}"
          git push origin HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # them, and attach everything to the GitHub Release.
  # ------------------------------------------------------------------
  release-cli:
    runs-on: ubuntu-latest
    needs: release-images
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="agenttier-${VERSION}-${GOOS}-${GOARCH}${ext}"
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X github.com/agenttier/agenttier/pkg/version.Version=${VERSION}" \
            -o "$out" \
            ./cmd/cli/
          sha256sum "$out" > "${out}.sha256"
          mkdir -p dist
          mv "$out" "${out}.sha256" dist/
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # ------------------------------------------------------------------
  # Create a GitHub Release and attach CLI binaries + Helm chart.
  # ------------------------------------------------------------------
  github-release:
    runs-on: ubuntu-latest
    needs: [release-images, release-helm, release-cli]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          # buildx jobs leave .dockerbuild metadata artifacts behind. The
          # github-release step only needs cli-* and helm-chart. Glob
          # patterns keep the download fast and avoid download errors
          # on the opaque buildx blobs.
          pattern: "cli-*"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: helm-chart
      - name: Collate release assets
        run: |
          mkdir -p release-assets
          # CLI binaries and their checksums.
          find artifacts -type f \( -name 'agenttier-*' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          # Helm chart tarball.
          find artifacts -type f -name '*.tgz' -exec cp {} release-assets/ \;
          ls -la release-assets
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Write release body preamble
        id: preamble
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHART_VERSION="${VERSION#v}"
          cat > release-body.md <<EOF
          ## Install

          **Helm:**
          \`\`\`bash
          helm repo add agenttier https://agenttier.github.io/agenttier
          helm repo update
          helm install agenttier agenttier/agenttier \\
            --version ${CHART_VERSION} \\
            --namespace agenttier --create-namespace
          \`\`\`

          **Container images** (multi-arch amd64 + arm64):
          \`\`\`
          ghcr.io/agenttier/controller:${VERSION}
          ghcr.io/agenttier/router:${VERSION}
          ghcr.io/agenttier/web-ui:${VERSION}
          ghcr.io/agenttier/sandbox-general:${VERSION}
          ghcr.io/agenttier/sandbox-claude-code:${VERSION}
          ghcr.io/agenttier/sandbox-minimal:${VERSION}
          \`\`\`

          **CLI:**
          \`\`\`bash
          curl -L -o agenttier \\
            https://github.com/agenttier/agenttier/releases/download/${VERSION}/agenttier-${VERSION}-\$(uname -s | tr A-Z a-z)-\$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          chmod +x agenttier
          \`\`\`

          **Python SDK:** \`pip install agenttier==${CHART_VERSION}\` (once PyPI publish is enabled).

          See the [README](https://github.com/agenttier/agenttier#readme) and [CHANGELOG](https://github.com/agenttier/agenttier/blob/main/CHANGELOG.md) for details.

          ---
          EOF
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body_path: release-body.md
          append_body: true
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: release-assets/*

  # ------------------------------------------------------------------
  # Python SDK publish. Skipped automatically if PYPI_TOKEN is absent
  # so the very first release doesn't block on a secret we haven't
  # configured yet; the SDK can still be installed from the git tag.
  # ------------------------------------------------------------------
  release-sdk:
    runs-on: ubuntu-latest
    needs: release-images
    if: ${{ !contains(github.ref, '-rc') }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build wheel and sdist
        working-directory: python-sdk
        run: |
          pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: python-sdk/dist/*
      - name: Publish to PyPI
        working-directory: python-sdk
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PYPI_TOKEN secret not configured; skipping PyPI upload."
            echo "The wheel + sdist are still attached to the run as artifacts."
            exit 0
          fi
          pip install --upgrade twine
          twine upload dist/*
