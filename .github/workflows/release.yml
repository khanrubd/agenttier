name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io/agenttier

jobs:
  release-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Build and push controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/controller:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/controller:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
      - name: Build and push router
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.router
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/router:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/router:latest
      - name: Build and push web-ui
        uses: docker/build-push-action@v6
        with:
          context: web-ui
          file: web-ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/web-ui:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/web-ui:latest

  release-helm:
    runs-on: ubuntu-latest
    needs: release-images
    steps:
      - uses: actions/checkout@v4
      - name: Package Helm chart
        run: |
          helm package helm/agenttier/ --version ${GITHUB_REF#refs/tags/v} --app-version ${GITHUB_REF#refs/tags/v}
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: "*.tgz"

  release-sdk:
    runs-on: ubuntu-latest
    needs: release-images
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build and publish to PyPI
        working-directory: python-sdk
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
