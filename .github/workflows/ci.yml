name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Lint Web UI
        working-directory: web-ui
        run: |
          npm ci
          npm run lint
      - name: Helm lint
        run: helm lint helm/agenttier/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s-version: ["1.29", "1.30", "1.31"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Unit tests
        run: make test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.k8s-version }}
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binaries
        run: make build
      - name: Build Web UI
        working-directory: web-ui
        run: |
          npm ci
          npm run build
      - name: Build Docker images
        run: |
          docker build -t agenttier-controller:ci -f Dockerfile.controller .
          docker build -t agenttier-router:ci -f Dockerfile.router .
          docker build -t agenttier-webui:ci -f web-ui/Dockerfile web-ui/

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK
        working-directory: python-sdk
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: python-sdk
        run: pytest tests/ -v
      - name: Type check
        working-directory: python-sdk
        run: mypy src/agenttier/
