name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: License header check
        run: ./hack/check-license-headers.sh
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Lint Web UI
        working-directory: web-ui
        run: |
          npm ci
          npm run lint
      - name: Helm lint
        run: helm lint helm/agenttier/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s-version: ["1.29", "1.30", "1.31"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Unit tests
        run: make test
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.k8s-version }}
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binaries
        run: make build
      - name: Build Web UI
        working-directory: web-ui
        run: |
          npm ci
          npm run build
      - name: Web UI bundle-size gate
        run: ./hack/check-bundle-size.sh web-ui/dist
      - name: Build Docker images
        run: |
          docker build -t agenttier-controller:ci -f Dockerfile.controller .
          docker build -t agenttier-router:ci -f Dockerfile.router .
          docker build -t agenttier-webui:ci -f web-ui/Dockerfile web-ui/

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install SDK
        working-directory: python-sdk
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: python-sdk
        run: pytest tests/ -v
      - name: Type check
        working-directory: python-sdk
        run: mypy src/agenttier/

  # Build the docs site on every PR to catch broken nav entries, missing
  # pages, or dead internal links before they land on main.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material
      - name: Build site
        working-directory: docs
        run: mkdocs build --strict --site-dir /tmp/site

  # Security posture checks. These jobs are advisory: a noisy scanner
  # should not permanently block development. Where a finding matters
  # we promote it to the blocking lint/test jobs instead.
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so we can write results to the repo's Security tab via
      # GitHub's code-scanning SARIF uploader.
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks needs the full history to diff against earlier commits
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # go.mod integrity: ensure downloaded modules match recorded hashes.
      - name: go mod verify
        run: go mod verify

      # govulncheck scans Go source for CVEs in imported modules
      # (vuln.go.dev). Runs on the Go 1.25 toolchain now, so the
      # previously-CRITICAL findings (grpc CVE-2026-33186, the Go-1.22-era
      # stdlib CVEs) are cleared. Kept **advisory** by design: govulncheck
      # also surfaces freshly-disclosed Go stdlib CVEs whose only fix is the
      # *next* toolchain patch (not yet released). Blocking on those would
      # break main on every new upstream disclosure for something we can't
      # yet fix. The CI Go version floats to the latest 1.25.x, so they
      # self-clear on the next patch; findings land in the Security tab for
      # visibility in the meantime. gosec (above) is the blocking code-scan.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

      # Static analysis for Go-specific security bugs (weak crypto, SQL
      # injection, blocklisted imports, etc.). BLOCKING as of the Go 1.25
      # bump. A few rule classes are excluded with rationale (each is also
      # gated per-site in golangci-lint's gosec via //nolint, the lint job):
      #   G115 — int->uint16 casts at the terminal protocol boundary are
      #          bounds-checked upstream (matches .golangci.yml).
      #   G204 — subprocess launch with user input IS the product contract
      #          (exec/invoke/pty run caller-supplied commands by design).
      #   G101 — false positives on label-key / Secret-name-prefix string
      #          constants in the API-key store (not credentials).
      #   G705 — false positive: the rate-limit 429 body interpolates only
      #          ints into a constant JSON format string (no user input).
      # gosec still blocks on every other rule class.
      - name: gosec
        uses: securego/gosec@master
        with:
          args: "-exclude-dir=test -exclude-generated -exclude=G115,G204,G101,G705 -fmt=sarif -out=gosec.sarif ./..."

      - name: Upload gosec SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
          category: gosec
        continue-on-error: true

      # Trivy filesystem scan: picks up vulnerable dependencies in the
      # repo itself (go.sum, package-lock.json, python-sdk pyproject).
      # The grpc CVE-2026-33186 that previously blocked here is cleared by
      # the Go 1.25 dependency bump. Kept **advisory** by design: Trivy
      # tracks the upstream CVE feed, so a freshly-disclosed HIGH in a
      # transitive dep would otherwise turn main red on an unrelated
      # upstream disclosure before a fix is even published. SARIF uploads to
      # the Security tab give us the drift signal; gosec is the blocking
      # code-level gate.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
        continue-on-error: true

      # Secret scanning: catches anything that looks like a credential
      # that got committed. Complements GitHub's own secret scanning by
      # checking newly-added files in PRs.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Exit 0 even on findings; treat as advisory.
          GITLEAKS_ENABLE_COMMENTS: "false"
        continue-on-error: true

      # Container image scans. These run only on pushes to main so we
      # don't rebuild on every PR (it's slow and the build job already
      # validates the images); the result is still written to the
      # Security tab for baseline visibility.
      #
      # Sandbox images get their own SARIF categories so an operator can
      # see CVE drift per image. The sandbox images are the user-facing
      # surface — their base layers (Alpine, Python, Node) churn faster
      # than the controller image, and a CVE there lands in user
      # workloads via `helm upgrade`. Scanning them in CI is the early
      # warning channel that closes the supply-chain gap separately
      # tracked as "CVE scanning for sandbox base images in CI."
      - name: Build controller image for scanning
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker build -t agenttier-controller:scan -f Dockerfile.controller .

      - name: Trivy image scan (controller)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "agenttier-controller:scan"
          format: "sarif"
          output: "trivy-controller.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy controller image SARIF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-controller.sarif
          category: trivy-controller
        continue-on-error: true

      # Sandbox base images — every one we ship to ghcr.io. Each gets its
      # own SARIF category so a CVE on, say, the Claude Code image
      # doesn't get aggregated with general-coding's findings.
      - name: Build sandbox-general image for scanning
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Context is the repo root so the runtime build stage can pull in
        # cmd/sandbox-runtime + pkg/sandboxruntime. Matches release.yml.
        run: docker build -t agenttier-sandbox-general:scan -f images/general-coding/Dockerfile .

      - name: Trivy image scan (sandbox-general)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "agenttier-sandbox-general:scan"
          format: "sarif"
          output: "trivy-sandbox-general.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy sandbox-general SARIF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-sandbox-general.sarif
          category: trivy-sandbox-general
        continue-on-error: true

      - name: Build sandbox-claude-code image for scanning
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker build -t agenttier-sandbox-claude-code:scan -f images/claude-code/Dockerfile .

      - name: Trivy image scan (sandbox-claude-code)
