version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    # The Go-toolchain-blocked majors (grpc, OTel, k8s.io/*, controller-runtime,
    # prometheus) were unblocked by the coordinated Go 1.25 bump (go.mod) and
    # are no longer held — Dependabot may now propose them. They still arrive
    # as grouped PRs (see `groups` below) so the version-locked sets land
    # together.
    groups:
      # Bundle the Kubernetes client libraries together. These are version-locked
      # in practice — upgrading one without the others causes compile failures.
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/controller-runtime"
      # Bundle OpenTelemetry packages — they share a release train and expect
      # matching minor versions across otel, otel/sdk, otel/trace, exporters, etc.
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"

  - package-ecosystem: "npm"
    directory: "/web-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    # Hold off on major upgrades — we'll do a coordinated tooling refresh
    # (React Router, Vite, TypeScript, ESLint) together rather than piecemeal.
    # The peer-dependent packages are ignored alongside their anchors.
    # `vite` gets a tighter rule because security-driven transitive bumps
    # (e.g. esbuild) keep dragging vite forward; we want to stay on 5.x
    # until the coordinated refresh.
    ignore:
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

  # The /examples/langgraph-agent/requirements.txt is intentionally pinned
  # to match the sandbox-langgraph reference image (images/langgraph/
  # Dockerfile). Letting Dependabot bump the example without bumping the
  # image would make the example deviate from what users actually run when
  # they pull the published image. We coordinate both files manually when
  # we want to refresh the agent harness deps.
  - package-ecosystem: "pip"
    directory: "/examples/langgraph-agent"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0  # don't auto-open; human-driven coordinated bumps only
    labels:
      - "dependencies"
      - "python"

  # python-sdk lives at /python-sdk; we DO want Dependabot to manage its
  # own deps independently of the example.
  - package-ecosystem: "pip"
    directory: "/python-sdk"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    # Skip major Go runtime bumps; we upgrade Go explicitly when we move go.mod.
    ignore:
      - dependency-name: "docker/library/golang"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
