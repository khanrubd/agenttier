{{- if .Values.defaults.strandsBedrock }}
apiVersion: agenttier.io/v1alpha1
kind: ClusterSandboxTemplate
metadata:
  name: strands-bedrock
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
spec:
  description: "AWS Strands Agents SDK preinstalled, talking to Amazon Bedrock"
  image:
    repository: {{ include "agenttier.resolveSandboxImage" (dict "image" .Values.defaults.strandsBedrock.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  storage:
    size: 10Gi
    mountPath: /workspace
  network:
    allowInternet: true
  harness:
    shell: /bin/bash
    workingDir: /workspace
    # HTTP-exec opt-in. The image bakes the in-pod runtime, so /exec,
    # /files, and /invoke route via HTTP with SPDY fallback.
    useHTTPExec: true
    tools:
      - name: python3
        verifyCommand: "python3 --version"
      - name: aws
        verifyCommand: "aws --version"
      - name: strands
        # No CLI; verify the SDK loads.
        verifyCommand: "python3 -c 'import importlib.metadata; print(importlib.metadata.version(\"strands-agents\"))'"
    hooks:
      onStart: "echo 'Strands sandbox ready — Bedrock credentials via IRSA. Try: python /opt/agenttier/examples/agent.py'"
  env:
    - name: AWS_DEFAULT_REGION
      value: "us-east-1"
  timeout: 24h
  idleTimeout: 2h
{{- end }}
---
apiVersion: agenttier.io/v1alpha1
kind: ClusterSandboxTemplate
metadata:
  name: langgraph-agent
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
spec:
  description: "Agent-mode sandbox preloaded with LangGraph, LangChain, httpx, and the mem0 client"
  mode: agent
  image:
    repository: {{ include "agenttier.resolveSandboxImage" (dict "image" .Values.defaults.langgraph.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  storage:
    size: 10Gi
    mountPath: /workspace
  network:
    # Agent code typically needs outbound access to a model provider
    # and (optionally) a memory backend. Operators can lock this down by
    # setting allowedDomains in their own template, or extending this
    # one with a child template that overrides .spec.network.
    allowInternet: true
  harness:
    shell: /bin/bash
    workingDir: /workspace
    # HTTP-exec opt-in. langgraph ships the in-pod runtime — agent
    # /invoke now streams via HTTP, fixing cross-replica cancel.
    # Falls back to SPDY automatically when the runtime isn't ready.
    useHTTPExec: true
    agent:
      # Default entrypoint runs /workspace/agent.py (the bundled example
      # ships at /opt/agenttier/examples/agent.py — copy it to /workspace
      # via /configure or replace with your own).
      entrypoint:
        - python
        - /workspace/agent.py
      workingDir: /workspace
      # Sensible default for chat-style agents. Operators can lower this
      # by overriding the template; governance enforces a cluster ceiling.
      defaultInvokeTimeout: 30m
  timeout: 24h
  idleTimeout: 4h
---
# rl-rollout — reference template for reinforcement-learning workloads.
# Pairs with the sandbox-rl image (images/rl/Dockerfile). See
# docs/docs/features.md and the bundled README at
# /opt/agenttier/examples/README.md inside the image for the canonical
# patterns (rollout worker / self-contained PPO loop / RL-driven agent).
apiVersion: agenttier.io/v1alpha1
kind: ClusterSandboxTemplate
metadata:
  name: rl-rollout
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
spec:
  description: "RL rollout worker preloaded with PyTorch (CPU), Ray RLlib, Gymnasium, and Stable-Baselines3"
  mode: agent
  image:
    repository: {{ include "agenttier.resolveSandboxImage" (dict "image" .Values.defaults.rl.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
  resources:
    # Sized for a typical PPO worker. Bump per-sandbox if your env is
    # heavier; clamped per-namespace by governance.
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi
  storage:
    # 20 GiB so checkpoints + replay buffers + the PyTorch cache fit
    # comfortably across a long curriculum run. Bump per-sandbox when
    # training a model that checkpoints in 1-2 GB increments.
    size: 20Gi
    mountPath: /workspace
  network:
    # Most RL rollouts need outbound access either to a Ray head node or
    # to an experiment-tracking server (Weights & Biases, MLflow). Lock
    # this down with allowedDomains in a child template if your security
    # posture requires it.
    allowInternet: true
  harness:
    shell: /bin/bash
    workingDir: /workspace
    # HTTP-exec opt-in. The runtime binary is baked into the image so
    # /invoke streams via HTTP and cross-replica cancel works.
    useHTTPExec: true
    agent:
      # Default entrypoint runs /workspace/agent.py — drop your rollout
      # script at that path or replace via /configure. The bundled
      # example at /opt/agenttier/examples/agent.py reads JSON on stdin
      # and prints {episode_reward, episode_length} on stdout.
      entrypoint:
        - python
        - /workspace/agent.py
      workingDir: /workspace
      # Single rollout finishes well under a minute; bump this if your
      # episode budget grows.
      defaultInvokeTimeout: 10m
  timeout: 24h
  idleTimeout: 1h
