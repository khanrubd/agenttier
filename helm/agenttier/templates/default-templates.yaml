apiVersion: agenttier.io/v1alpha1
kind: ClusterSandboxTemplate
metadata:
  name: general-coding
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
spec:
  description: "General-purpose coding environment with Node.js, Python, and Git"
  image:
    repository: {{ include "agenttier.resolveSandboxImage" (dict "image" .Values.defaults.sandbox.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  storage:
    size: 10Gi
    mountPath: /workspace
  network:
    allowInternet: true
  harness:
    shell: /bin/bash
    workingDir: /workspace
    # HTTP-exec opt-in: this image bakes the in-pod sandbox-runtime
    # binary, so /exec, /files, and /invoke calls go through the
    # runtime's HTTP API instead of SPDY. Falls back to SPDY
    # transparently when /healthz fails or the token Secret isn't
    # available — see pkg/router/exec_dispatch.go.
    useHTTPExec: true
    tools:
      - name: node
        verifyCommand: "node --version"
      - name: python3
        verifyCommand: "python3 --version"
      - name: git
        verifyCommand: "git --version"
  timeout: 24h
  idleTimeout: 4h
---
apiVersion: agenttier.io/v1alpha1
kind: ClusterSandboxTemplate
metadata:
  name: claude-code-bedrock
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
spec:
  description: "AI coding agent with Claude Code CLI powered by AWS Bedrock"
  image:
    repository: {{ include "agenttier.resolveSandboxImage" (dict "image" .Values.defaults.claudeCode.image "global" .Values.global "appVersion" .Chart.AppVersion) }}
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  storage:
    size: 20Gi
    mountPath: /workspace
  network:
    allowInternet: true
  harness:
    shell: /bin/bash
    workingDir: /workspace
    # HTTP-exec opt-in. Same rationale as general-coding above —
    # claude-code-bedrock ships the in-pod runtime, so /exec, /files,
    # and /invoke route via HTTP with SPDY fallback.
    useHTTPExec: true
    tools:
      - name: claude
        verifyCommand: "claude --version"
      - name: node
        verifyCommand: "node --version"
      - name: python3
        verifyCommand: "python3 --version"
      - name: git
        verifyCommand: "git --version"
      - name: aws
        verifyCommand: "aws --version"
    hooks:
      onStart: "echo 'Claude Code sandbox ready — Bedrock credentials injected via IRSA'"
  env:
    - name: CLAUDE_CODE_USE_BEDROCK
      value: "1"
    - name: AWS_DEFAULT_REGION
      value: "us-east-1"
  timeout: 24h
  idleTimeout: 2h
