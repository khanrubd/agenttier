{{- if .Values.security.gvisor.enabled }}
# RuntimeClass that maps the `gvisor` runtime to the runsc handler. Sandboxes
# and templates opt in with `runtimeClass: gvisor`; the pod builder sets
# Pod.spec.runtimeClassName accordingly. scheduling.nodeSelector pins those
# pods to nodes labelled for gVisor so the rest of the fleet stays on runc.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .Values.security.gvisor.runtimeClassName }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
handler: runsc
{{- with .Values.security.gvisor.nodeSelector }}
scheduling:
  nodeSelector:
    {{- toYaml . | nindent 4 }}
{{- end }}
{{- if .Values.security.gvisor.installer.enabled }}
---
# Opt-in installer: drops the runsc binary + containerd shim onto labelled
# nodes and registers the runsc runtime in containerd, then idles. Standard
# containerd nodes only (AL2 / AL2023 / Ubuntu with systemd + containerd);
# NOT for Bottlerocket (use its gVisor variant) or container-optimized images
# with a read-only root. Privileged + host mounts are required to install a
# node runtime — review before enabling.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenttier.fullname" . }}-gvisor-installer
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
data:
  install.sh: |
    #!/bin/sh
    set -eu
    arch="$(uname -m)"
    base="https://storage.googleapis.com/gvisor/releases/release/latest/${arch}"
    echo "installing runsc for ${arch} from ${base}"
    for bin in runsc containerd-shim-runsc-v1; do
      wget -q -O "/tmp/${bin}" "${base}/${bin}"
      chmod +x "/tmp/${bin}"
      cp "/tmp/${bin}" /host/usr/local/bin/
    done
    cfg=/host/etc/containerd/config.toml
    if ! grep -q 'containerd.runtimes.runsc' "${cfg}" 2>/dev/null; then
      echo "registering runsc runtime in containerd"
      {
        echo ''
        echo '[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]'
        echo '  runtime_type = "io.containerd.runsc.v1"'
      } >> "${cfg}"
      chroot /host systemctl restart containerd || echo "WARN: could not restart containerd; do it manually"
    else
      echo "runsc runtime already registered"
    fi
    echo "runsc install complete; idling"
    # Idle so the DaemonSet stays Ready and re-installs on node replacement.
    while true; do sleep 3600; done
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "agenttier.fullname" . }}-gvisor-installer
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: gvisor-installer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: gvisor-installer
  template:
    metadata:
      labels:
        {{- include "agenttier.labels" . | nindent 8 }}
        app.kubernetes.io/component: gvisor-installer
    spec:
      {{- with .Values.security.gvisor.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: installer
          image: public.ecr.aws/docker/library/alpine:3.20
          securityContext:
            privileged: true
          command: ["/bin/sh", "/scripts/install.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: host
              mountPath: /host
      volumes:
        - name: scripts
          configMap:
            name: {{ include "agenttier.fullname" . }}-gvisor-installer
        - name: host
          hostPath:
            path: /
{{- end }}
{{- end }}
