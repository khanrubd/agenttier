{{- /*
Copyright 2024 AgentTier Authors.
SPDX-License-Identifier: Apache-2.0

Cluster Autoscaler — opt-in node-level scaling.

Wraps the upstream `kubernetes/autoscaler` Cluster Autoscaler in an
AgentTier-friendly Helm template. Enabled via
`optional.clusterAutoscaler.enabled=true`.

Cloud-neutral: driven by `cloudProvider`. Auto-discovery uses
ASG/MIG tags (`k8s.io/cluster-autoscaler/enabled` +
`k8s.io/cluster-autoscaler/<cluster-name>`) which Terraform sets up
in `terraform/aws-eks/main.tf`. For other clouds, follow the
upstream provider docs and tag your node pools accordingly.

We deliberately install CAS in the AgentTier namespace, NOT
kube-system. Avoids RBAC and namespace ownership conflicts with
operators (some platform teams already run CAS for non-AgentTier
workloads in kube-system). The ClusterRole still has cluster scope
because CAS has to see all nodes/pods.
*/ -}}
{{- if .Values.optional.clusterAutoscaler.enabled }}
{{- $caName := printf "%s-cluster-autoscaler" (include "agenttier.fullname" .) -}}
{{- $clusterName := .Values.optional.clusterAutoscaler.clusterName | default .Release.Name -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $caName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-autoscaler
  {{- with .Values.optional.clusterAutoscaler.serviceAccountRoleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $caName }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-autoscaler
rules:
  # Required to read scheduler state and watch all pods, including kube-system.
  - apiGroups: [""]
    resources: ["events", "endpoints"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["endpoints"]
    resourceNames: ["cluster-autoscaler"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["watch", "list", "get", "update"]
  - apiGroups: [""]
    resources:
      - "namespaces"
      - "pods"
      - "services"
      - "replicationcontrollers"
      - "persistentvolumeclaims"
      - "persistentvolumes"
    verbs: ["watch", "list", "get"]
  - apiGroups: ["extensions"]
    resources: ["replicasets", "daemonsets"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["watch", "list"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "replicasets", "daemonsets"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes", "csidrivers", "csistoragecapacities"]
    verbs: ["watch", "list", "get"]
  - apiGroups: ["batch", "extensions"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resourceNames: ["cluster-autoscaler"]
    resources: ["leases"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $caName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cluster-autoscaler-status", "cluster-autoscaler-priority-expander"]
    verbs: ["delete", "get", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $caName }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $caName }}
subjects:
  - kind: ServiceAccount
    name: {{ $caName }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $caName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $caName }}
subjects:
  - kind: ServiceAccount
    name: {{ $caName }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $caName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "agenttier.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cluster-autoscaler
  template:
    metadata:
      labels:
        {{- include "agenttier.labels" . | nindent 8 }}
        app.kubernetes.io/component: cluster-autoscaler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
    spec:
      serviceAccountName: {{ $caName }}
      # CAS needs at least one node it can run on. Don't tolerate the
      # node.kubernetes.io/not-ready taint — if the cluster has no
      # ready nodes there's nothing for CAS to do anyway.
      priorityClassName: system-cluster-critical
      containers:
        - name: cluster-autoscaler
          image: {{ .Values.optional.clusterAutoscaler.image.repository }}:{{ .Values.optional.clusterAutoscaler.image.tag }}
          imagePullPolicy: {{ .Values.optional.clusterAutoscaler.image.pullPolicy }}
          command:
            - ./cluster-autoscaler
            - --v=4
            - --stderrthreshold=info
            - --cloud-provider={{ .Values.optional.clusterAutoscaler.cloudProvider }}
            # CAS hardcodes `kube-system` for its status ConfigMap unless
            # we override. We install it in the agenttier namespace, so
            # this flag tells it where to look. The Role binding scopes
            # ConfigMap access to this namespace too.
            - --namespace={{ .Release.Namespace }}
            - --skip-nodes-with-local-storage={{ index .Values.optional.clusterAutoscaler.extraArgs "skipNodesWithLocalStorage" }}
            - --skip-nodes-with-system-pods={{ index .Values.optional.clusterAutoscaler.extraArgs "skipNodesWithSystemPods" }}
            - --expander=least-waste
            - --node-group-auto-discovery=asg:tag=k8s.io/cluster-autoscaler/enabled,k8s.io/cluster-autoscaler/{{ $clusterName }}
            - --balance-similar-node-groups
            - --scale-down-unneeded-time={{ index .Values.optional.clusterAutoscaler.extraArgs "scaleDownUnneededTime" }}
            - --scale-down-utilization-threshold={{ index .Values.optional.clusterAutoscaler.extraArgs "scaleDownUtilizationThreshold" }}
          env:
            - name: AWS_REGION
              value: {{ .Values.optional.clusterAutoscaler.region | default "us-east-1" }}
          resources:
            {{- toYaml .Values.optional.clusterAutoscaler.resources | nindent 12 }}
          ports:
            - name: metrics
              containerPort: 8085
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
{{- end }}
