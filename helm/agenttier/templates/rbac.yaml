apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agenttier.serviceAccountName" . }}
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agenttier.fullname" . }}-controller
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
rules:
  # Sandbox and Template CRDs
  - apiGroups: ["agenttier.io"]
    resources: ["sandboxes", "sandboxes/status", "sandboxtemplates", "clustersandboxtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # NetworkPolicies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ServiceAccounts
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services (for port forwarding)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Ingresses (for port forwarding preview URLs)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ConfigMaps (warm pool + governance policy storage, plus leader election)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  # VolumeSnapshots (for cloning and backups)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # HTTPRoutes (for port forwarding via Gateway API)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Nodes — read-only. Used by the Router's /api/v1/cluster/status
  # endpoint to surface ready/total node counts to the Web UI's left-nav
  # glance widget. The ClusterAutoscaler Deployment has its own
  # ClusterRole with broader node access (including update for cordon
  # operations); this rule is the minimal read-only surface the rest of
  # the platform needs.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Deployments — apps/v1. The Router's /api/v1/cluster/headroom GET +
  # admin-gated PUT reads and updates the chart's `agenttier-headroom`
  # Deployment so operators can resize the spare-node reservation
  # without `helm upgrade`. Cluster-scoped get/list/watch is acceptable
  # because the API only ever reaches into our install namespace; we
  # leave it cluster-wide so the same role works on multi-namespace
  # installs.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Secrets — read-only for template file references, plus full lifecycle on
  # the per-sandbox runtime-token Secrets the controller creates as part of
  # the HTTP-exec rollout (Phase 3). Each Secret is owned by its Sandbox via
  # ownerReferences, so deletion cleans up automatically — but the
  # controller still needs explicit create/update/delete to create them in
  # the first place and to rotate them when a sandbox is recreated.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agenttier.fullname" . }}-controller
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agenttier.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "agenttier.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
