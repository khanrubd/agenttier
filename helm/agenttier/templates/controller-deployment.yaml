apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenttier.fullname" . }}-controller
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "agenttier.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "agenttier.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agenttier.serviceAccountName" . }}
      containers:
        - name: controller
          image: {{ include "agenttier.controllerImage" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.controller.leaderElect }}
            - --max-concurrency={{ .Values.controller.maxConcurrency }}
            - --metrics-bind-address=:8081
            - --health-probe-bind-address=:8082
            {{- if and .Values.optional.agentMemorySidecar .Values.optional.agentMemorySidecar.enabled }}
            - --agent-memory-sidecar-image={{ .Values.optional.agentMemorySidecar.image }}
            {{- end }}
            {{- if .Values.optional.admissionWebhook.enabled }}
            - --enable-webhook
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.observability.otlp.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlp.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ .Values.observability.otlp.insecure | default true | quote }}
            {{- else if .Values.observability.otelCollector.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ include "agenttier.fullname" . }}-otel-collector.{{ .Release.Namespace }}.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
            {{- if .Values.optional.admissionWebhook.enabled }}
            - name: webhook
              containerPort: 9443
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{- if .Values.optional.admissionWebhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if .Values.optional.admissionWebhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "agenttier.fullname" . }}-webhook-cert
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
