apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenttier.fullname" . }}-router
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      {{- include "agenttier.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: router
  template:
    metadata:
      labels:
        {{- include "agenttier.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: router
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agenttier.serviceAccountName" . }}
      containers:
        - name: router
          image: {{ include "agenttier.routerImage" . }}
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          args:
            - --listen-addr=:8080
            - --oidc-issuer={{ .Values.auth.oidc.issuerUrl }}
            - --oidc-client-id={{ .Values.auth.oidc.clientId }}
            - --admin-group={{ .Values.auth.oidc.adminGroup }}
            - --group-claim={{ .Values.auth.oidc.groupClaim }}
            {{- if .Values.auth.devAuth }}
            - --dev-auth
            {{- end }}
            - --preview-domain={{ .Values.networking.previewDomain }}
            - --ingress-class-name={{ .Values.networking.portForwardIngressClass }}
            {{- with .Values.router.rateLimit }}
            {{- if .perIPPerSecond }}
            - --ratelimit-per-ip-rate={{ .perIPPerSecond }}
            {{- end }}
            {{- if .perUserPerSecond }}
            - --ratelimit-per-user-rate={{ .perUserPerSecond }}
            {{- end }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SANDBOX_NAMESPACE
              value: {{ .Values.defaults.sandboxNamespace | default "default" | quote }}
            {{- /*
              OTLP endpoint resolution:
                1. If observability.otlp.endpoint is set explicitly, use it.
                2. Else if observability.otelCollector.enabled is true, point
                   at the in-cluster collector Service.
                3. Else leave it unset; pkg/otel installs a noop tracer
                   that drops spans cheaply.
            */ -}}
            {{- if .Values.observability.otlp.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlp.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ .Values.observability.otlp.insecure | default true | quote }}
            {{- else if .Values.observability.otelCollector.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ include "agenttier.fullname" . }}-otel-collector.{{ .Release.Namespace }}.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            {{- end }}
            {{- if and .Values.optional.storage.enabled (eq .Values.optional.storage.driver "sqlite") }}
            - name: STORAGE_SQLITE_PATH
              value: {{ .Values.optional.storage.sqlite.path | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
          {{- if and .Values.optional.storage.enabled (eq .Values.optional.storage.driver "sqlite") .Values.optional.storage.sqlite.persistence.enabled }}
          volumeMounts:
            - name: storage
              mountPath: {{ dir .Values.optional.storage.sqlite.path | quote }}
          {{- end }}
      {{- if and .Values.optional.storage.enabled (eq .Values.optional.storage.driver "sqlite") .Values.optional.storage.sqlite.persistence.enabled }}
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "agenttier.fullname" . }}-router-storage
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenttier.fullname" . }}-router
  labels:
    {{- include "agenttier.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  type: {{ .Values.router.service.type }}
  ports:
    - port: {{ .Values.router.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agenttier.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: router
