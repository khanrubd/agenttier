# AgentTier Helm Chart Values
# Full configuration reference: https://docs.agenttier.io/installation

# --- Controller ---
controller:
  image:
    repository: ghcr.io/agenttier/controller
    tag: ""  # Defaults to chart appVersion
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  maxConcurrency: 10
  leaderElect: true

# --- Router ---
router:
  image:
    repository: ghcr.io/agenttier/router
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
  # Rate limiting throttles abusive callers before they reach handlers.
  # Both layers default to off (zero rate). Enabling either applies a
  # token-bucket counter:
  #   perIPPerSecond: throttles by client IP (X-Forwarded-For aware).
  #     Applies to authenticated AND anonymous traffic. 1.0 = 60/min.
  #   perUserPerSecond: throttles by Sub claim. Authenticated users
  #     usually need a higher ceiling than per-IP because they're
  #     identifiable. 10.0 = 600/min.
  # /healthz, /readyz, /metrics, and /ws/* are always exempt — kubelet
  # probes and WebSocket terminals must not be 429'd.
  rateLimit:
    perIPPerSecond: 0
    perUserPerSecond: 0

# --- Web UI ---
webui:
  image:
    repository: ghcr.io/agenttier/web-ui
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80

# --- External Database (future) ---
# AgentTier stores all state in Kubernetes (etcd) by default.
# To enable persistent audit history, governance policies, and analytics
# beyond what Kubernetes Events retain, configure an external database.
# Currently planned: SQL (PostgreSQL, MySQL) — not yet implemented.
# database:
#   enabled: false
#   type: postgres
#   connectionString: ""

# --- Authentication ---
auth:
  # devAuth bypasses ALL authentication and treats every request as admin.
  # It exists for local development and quick demos only. It is OFF by
  # default: a production install that forgets to configure an OIDC issuer
  # fails closed (every API call returns 401) rather than silently granting
  # blanket admin access to anyone who can reach the Router. The Router logs
  # a loud warning at startup when this is enabled.
  #
  # NEVER set this to true in a cluster reachable by untrusted users.
  devAuth: false
  oidc:
    issuerUrl: ""
    clientId: ""
    # Reference to a K8s Secret containing the client secret
    clientSecretRef: ""
    adminGroup: "agenttier-admins"
    groupClaim: "groups"
    # Map IdP groups to namespaces: {"platform-team": "platform", "data-team": "data"}
    groupNamespaceMapping: {}
  apiKeys:
    enabled: true

# --- Sandbox Defaults ---
defaults:
  # sandboxNamespace is where the Router creates Sandboxes and therefore
  # where the warm pool provisions its idle Pods + PVCs. A pool Pod is
  # reused in place by the claiming Sandbox, and Kubernetes can't move a
  # Pod across namespaces, so this MUST match the namespace Sandboxes are
  # created in. The Router defaults new Sandboxes to "default"; change both
  # together if you move Sandboxes elsewhere. Distinct from the install
  # namespace (where the controller/router run and the pool ConfigMap lives).
  sandboxNamespace: "default"

  sandbox:
    # Defaults to the chart's appVersion when the tag is omitted at render
    # time. Users can override to pin a specific image.
    image: ghcr.io/agenttier/sandbox-general:v0.7.1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    storage:
      size: 10Gi
      storageClass: ""
      mountPath: /workspace
    timeout: 8h
    idleTimeout: 1h
  claudeCode:
    image: ghcr.io/agenttier/sandbox-claude-code:v0.7.1
    # IRSA role ARN for Bedrock access (annotated on sandbox ServiceAccount)
    irsaRoleArn: ""
  openclaw:
    # OpenClaw CLI (https://github.com/openclaw/openclaw) preconfigured
    # to talk to AWS Bedrock via IRSA. Same shape as claudeCode above —
    # the image bakes a baseline config that pre-enables the Bedrock
    # provider + discovery, and the entrypoint seeds it to the writable
    # PVC on first launch so user customizations persist across
    # stop/resume.
    image: ghcr.io/agenttier/sandbox-openclaw:v0.7.1
    # IRSA role ARN for Bedrock access (annotated on sandbox ServiceAccount).
    # Required IAM permissions: bedrock:InvokeModel,
    # bedrock:InvokeModelWithResponseStream, bedrock:ListFoundationModels,
    # bedrock:ListInferenceProfiles. Or attach AmazonBedrockFullAccess.
    irsaRoleArn: ""
  langgraph:
    # Phase 10 reference image for mode: agent sandboxes. Bundles
    # LangGraph + LangChain + httpx + the mem0 client. Pair with the
    # `langgraph-agent` default template (helm/agenttier/templates/
    # default-templates.yaml) to spin up an agent in one apply.
    image: ghcr.io/agenttier/sandbox-langgraph:v0.7.1
  strandsBedrock:
    # AWS Strands Agents SDK preinstalled, points at Bedrock by default.
    # IRSA-driven auth via the AWS SDK default credential chain — annotate
    # the namespace's default ServiceAccount with eks.amazonaws.com/role-arn
    # to give it Bedrock access. Pair with the `strands-bedrock` default
    # template.
    image: ghcr.io/agenttier/sandbox-strands-bedrock:v0.7.1
    irsaRoleArn: ""
  rl:
    # Reinforcement-learning reference image. PyTorch (CPU) + Ray RLlib +
    # Gymnasium + Stable-Baselines3 preinstalled. Pair with the
    # `rl-rollout` default template. CPU-only for now; GPU rollouts plug
    # in once a future phase lands GPU resource overrides on the CRD.
    image: ghcr.io/agenttier/sandbox-rl:v0.7.1

# --- Networking ---
networking:
  # Default network policy for all sandboxes: "deny-all" or "allow-internet"
  defaultPolicy: deny-all
  # Domain for port forwarding preview URLs (e.g., preview.agenttier.company.com)
  previewDomain: ""
  # Gateway API gateway name for port forwarding
  gatewayName: ""
  # Ingress class name used by port-forward Ingresses. Empty = cluster default.
  # Set this to "nginx", "alb", or "traefik" depending on your ingress controller.
  portForwardIngressClass: ""

# --- Security ---
security:
  gvisor:
    enabled: false
    runtimeClassName: gvisor
  podSecurityStandard: restricted

# --- Observability ---
observability:
  otlp:
    # OTLP gRPC endpoint (e.g., otel-collector:4317).
    #
    # When this is empty AND `otelCollector.enabled` is true, the chart
    # auto-points the router and controller at the in-cluster Collector
    # service (no manual wiring needed). Set this explicitly only if you
    # want to bypass the in-cluster collector and ship straight to an
    # external endpoint.
    endpoint: ""
    # Set to "false" to disable WithInsecure() — required when the
    # collector terminates TLS. Default is true (we trust in-cluster
    # traffic via NetworkPolicy / mTLS handled by service mesh if any).
    insecure: true
  prometheus:
    enabled: true
    # Set to true if the cluster has the Prometheus Operator installed.
    # Renders a ServiceMonitor for the router and (when otelCollector
    # is enabled) the collector's self-metrics endpoint.
    serviceMonitor: false
  # Opt-in OpenTelemetry Collector. Disabled by default — operators with
  # an existing cluster-wide collector should leave this off and set
  # `otlp.endpoint` directly. Operators starting from scratch can flip
  # this on for a self-contained one-helm-chart trace pipeline.
  otelCollector:
    enabled: false
    image: otel/opentelemetry-collector-contrib:0.104.0
    imagePullPolicy: IfNotPresent
    # Resources sized for ~1k spans/sec sustained. Bump for heavier
    # workloads; the memory_limiter processor caps RSS regardless.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Free-form YAML appended after the default pipeline. Common pattern
    # is to add a real exporter and swap the `debug` exporter out via a
    # Helm post-render. See docs/docs/observability.md for examples.
    extraConfig: ""

# --- Optional Components ---
optional:
  # Validating admission webhook for Sandbox resources.
  #
  # When enabled, the controller serves an admission webhook that (1) stamps
  # spec.createdBy from the authenticated Kubernetes user — so a forged
  # createdBy in a `kubectl apply` body is overwritten — and (2) runs the
  # same governance Check the Router runs, rejecting over-quota /
  # disallowed-template / disallowed-image creates. This closes the bypass
  # where direct cluster access (kubectl, GitOps, scripts) could skip the
  # governance that otherwise only runs in the Router.
  #
  # REQUIRES cert-manager (https://cert-manager.io) installed in the cluster:
  # the chart provisions a self-signed Issuer + Certificate and relies on
  # cert-manager's CA injector to populate the webhook caBundle. If you don't
  # run cert-manager, leave this disabled — Router-side governance still
  # applies to every create that goes through the API.
  admissionWebhook:
    enabled: false
    # failurePolicy controls what happens when the webhook is unreachable.
    # "Fail" (default) rejects the write — safest, closes the bypass even
    # during a controller outage. "Ignore" lets writes through when the
    # webhook is down — higher availability, but reopens the bypass window.
    failurePolicy: Fail

  # Image pre-pull DaemonSet
  #
  # When enabled the chart creates a DaemonSet that pre-pulls sandbox images
  # onto every node. Each node's kubelet fetches the images once on startup
  # and caches them in the container runtime, so the first sandbox on a node
  # skips the 15-30s image-pull leg and starts in ~1-2s.
  #
  # The sandbox image listed in `defaults.sandbox.image` and the Claude Code
  # image in `defaults.claudeCode.image` are pre-pulled automatically; add
  # any custom template images to `extraImages`.
  imagePrepull:
    enabled: false
    # Additional images to pre-pull (template images are auto-detected)
    extraImages: []
    # Optional nodeSelector for the DaemonSet. Defaults to the chart-wide
    # `nodeSelector` value. Set this if you want to pre-pull only on a
    # dedicated sandbox node pool.
    nodeSelector: {}
  # PodDisruptionBudget for controller and router
  pdb:
    enabled: true
    minAvailable: 1

  # Optional StorageClass with Immediate binding mode
  #
  # Default cluster StorageClasses usually use `WaitForFirstConsumer`, which
  # saves a cross-AZ volume attach but adds 5-10s to cold starts because the
  # PVC can't be provisioned until the Pod is scheduled. Enabling this class
  # lets us provision PVCs up front — a meaningful win for the warm pool and
  # for any template that prefers sub-second claim times.
  #
  # Provisioner defaults target AWS EBS CSI with gp3. Override for GKE, AKS,
  # or any other CSI driver. Users target this class via
  # `defaults.sandbox.storage.storageClass: <name>` or a template override.
  storageClass:
    enabled: false
    name: gp3-immediate
    provisioner: ebs.csi.aws.com
    allowVolumeExpansion: true
    reclaimPolicy: Delete
    parameters:
      type: gp3
      # Encrypted: "true"
      # kmsKeyId: "arn:aws:kms:…"
  # Optional mem0 sidecar for agent-mode sandboxes (Phase 10).
  #
  # When enabled, every Sandbox created with `mode: agent` gains a
  # mem0 sidecar container in its Pod (alongside the user's agent
  # container). The sandbox container automatically gets
  # MEM0_BASE_URL=http://localhost:11434 in its env, so framework code
  # can dial the sidecar at localhost without touching network policy.
  #
  # Sidecar storage lives on the same workspace PVC at
  # /workspace/.agenttier/memory, so memory survives stop/resume the
  # same way user code does.
  #
  # Pin to an exact tag for reproducibility. We default to a known
  # stable tag; bump as upstream releases.
  agentMemorySidecar:
    enabled: false
    # Platform note: as of late 2025 mem0 only ships an arm64 image at
    # docker.io/mem0/mem0-api-server. Running this on amd64 nodes (the
    # default for most EKS / GKE setups) requires either an arm64 node
    # group or a custom multi-arch rebuild of the mem0 server. We pin by
    # digest because mem0 only publishes the `latest` tag — by-digest
    # references give you a reproducible reference. Update the digest when
    # you want a newer build. Disabled by default for that reason.
    image: "mem0/mem0-api-server@sha256:2fcf4bb713cfc584d454bf06993cc7e2fe51540695995bd3aa9c7008b7065c75"
  # Ingress for Web UI
  #
  # When enabled the chart creates a single Ingress routing `/`, `/api/`, and
  # `/ws/` to the web-ui Service (which already terminates via nginx). The
  # default annotations below are tuned for the AWS Load Balancer Controller
  # (ALB). Set `className` to `alb`, `nginx`, or `traefik` depending on your
  # ingress controller.
  #
  # Important for WebSocket terminals:
  #   * `idle_timeout.timeout_seconds` must be well above your longest idle
  #     terminal session. We default to 4000s. The Router also sends
  #     RFC 6455 control pings + application-level heartbeats every 30s to
  #     keep middleboxes from considering the connection idle.
  #   * Sticky sessions keep a reconnecting browser on the same Router pod
  #     so the in-memory session reattaches cleanly.
  ingress:
    enabled: false
    # Ingress class name: `alb`, `nginx`, `traefik`, ...
    className: "alb"
    # Annotations merged onto the Ingress. These defaults assume the AWS Load
    # Balancer Controller is installed.
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
      alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=4000
      alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.type=lb_cookie,stickiness.lb_cookie.duration_seconds=3600
      # Uncomment to serve HTTPS with an ACM certificate and force HTTP→HTTPS.
      # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      # alb.ingress.kubernetes.io/ssl-redirect: '443'
      # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:111122223333:certificate/xxxxxxxx
    hosts:
      - host: agenttier.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # Cluster Autoscaler — opt-in node-level autoscaling.
  #
  # Adds the upstream `kubernetes/autoscaler` Cluster Autoscaler as a
  # Deployment in this namespace, plus the ServiceAccount + ClusterRole +
  # ClusterRoleBinding it needs. The Helm chart does NOT add the cloud-
  # provider IAM (IRSA on EKS, Workload Identity on GKE, etc.) — operators
  # provision that out-of-band and supply the role ARN below.
  #
  # When enabled, CAS auto-discovers ASGs / MIGs tagged with
  # `k8s.io/cluster-autoscaler/enabled` and `k8s.io/cluster-autoscaler/<cluster>`,
  # scales them up when pods go Pending, scales them down when nodes sit
  # idle past the configured threshold. Cloud-neutral: works on EKS, GKE,
  # AKS, kops, kubeadm + cluster-api.
  #
  # See docs/docs/scaling.md for the full pairing with `optional.headroom`
  # below to get N+1-node-spare proactive scaling instead of
  # reactive-only.
  clusterAutoscaler:
    enabled: false
    # Cloud provider: aws | gce | azure | clusterapi | externalgrpc.
    cloudProvider: aws
    # Auto-discovery filter (cluster name) — required when CAS is set to
    # discover ASGs by tag rather than statically configured. Default
    # matches the standard EKS naming convention.
    clusterName: ""
    # IRSA role ARN (or equivalent) for the ServiceAccount. Cloud-provider-
    # specific; for EKS this is the role with the AutoScalingFullAccess +
    # EKS describe + EC2 describe + EC2 launch policies attached. Empty
    # disables the annotation, useful for kops/kubeadm where the underlying
    # node IAM role already has the perms.
    serviceAccountRoleArn: ""
    image:
      repository: registry.k8s.io/autoscaling/cluster-autoscaler
      # Tag must match the cluster's K8s minor version. Default tracks 1.30.
      tag: v1.30.3
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 300Mi
      limits:
        cpu: 200m
        memory: 600Mi
    # Tunables — see https://github.com/kubernetes/autoscaler/blob/master/cluster-autoscaler/FAQ.md
    extraArgs:
      # Wait this long before scaling a node down for being underutilized.
      # 10m = default. Raise to 30m if you have bursty workloads with brief
      # quiet windows so CAS doesn't churn nodes you'll need again.
      scaleDownUnneededTime: 10m
      # A node below this utilization is a scale-down candidate.
      scaleDownUtilizationThreshold: "0.5"
      # Skip nodes that have local PVCs attached (we use them for sandbox
      # workspaces). Without this CAS may try to drain a node out from
      # under a sandbox with active state on its PVC.
      skipNodesWithLocalStorage: "false"
      # Skip nodes running pods from kube-system. Default true; we keep it
      # so the autoscaler doesn't shrink the cluster below kube-system's
      # minimum footprint.
      skipNodesWithSystemPods: "true"
      # Don't reduce the cluster below this many nodes regardless of
      # utilization. Set to 1 by default so the headroom Deployment always
      # has at least one node to land on.
      coresTotalMin: ""
      memoryTotalMin: ""

  # Proactive headroom — pause Pods that reserve N+1 node capacity.
  #
  # Cluster Autoscaler is REACTIVE: scale-up is triggered by Pending pods
  # and takes 60-90s on EKS (ASG round-trip). For interactive workloads
  # (browser terminals, sandbox creates) that's a visible wait. The
  # headroom pattern fixes it: deploy N pause pods at negative priority
  # sized to ~1 node's worth of capacity. They squat on the spare node.
  # When a real sandbox arrives, the scheduler preempts the pause pods
  # (instant), the sandbox lands on the warm node, and the evicted pause
  # pods go Pending — which fires CAS to add a fresh spare node. Net
  # effect: real sandboxes always land on already-warm nodes; new nodes
  # come up in the background.
  #
  # See docs/docs/scaling.md for sizing math + cost trade-offs. Disabled
  # by default because it adds ~$15-25/mo per always-on spare node-pair
  # of t3.large equivalents; turn on for latency-sensitive deployments.
  headroom:
    enabled: false
    # Replicas × resources determines how many sandboxes can land
    # instantly before a fresh node has to spin up. Default 4 × 500m/1Gi
    # = ~2 vCPU + 4Gi reserved, roughly one t3.large worth.
    replicas: 4
    cpu: 500m
    memory: 1Gi
    # PriorityClass value. Negative so any real pod preempts. -1000 is far
    # below kube-system's typical 2000000000 cutoff so we never preempt
    # system components.
    priorityValue: -1000
    # Image: pause is a 700KiB binary that sleeps forever. Public ECR
    # mirror to avoid Docker Hub rate limits.
    image: registry.k8s.io/pause:3.9
    # Standard k8s scheduling knobs.
    nodeSelector: {}
    tolerations: []
    affinity: {}

# --- Cost Estimation ---
costs:
  rates:
    cpuPerHour: 0.04
    memoryPerGBHour: 0.005
    storagePerGBHour: 0.0001

# --- Image Pull Secrets ---
imagePullSecrets: []

# --- Node Selector / Tolerations ---
nodeSelector: {}
tolerations: []
affinity: {}
