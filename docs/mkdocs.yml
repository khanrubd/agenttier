site_name: AgentTier
site_description: Kubernetes-native platform for isolated, persistent sandboxes — for humans and AI agents.
site_url: https://agenttier.github.io/agenttier/
repo_url: https://github.com/agenttier/agenttier
repo_name: agenttier/agenttier
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    # Left-nav only: drop `navigation.tabs` so the whole structure lives in
    # the sidebar. `navigation.expand` auto-opens every section.
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting started:
    - Quickstart: quickstart.md
    - Installation: installation.md
  - Tutorials:
    - Overview: tutorials/index.md
    - Web UI walkthrough: tutorials/web-ui.md
    - Python SDK walkthrough: tutorials/python-sdk.md
    - Code mode in depth: tutorials/code-mode.md
    - Agent mode in depth: tutorials/agent-mode-tutorial.md
  - Product:
    - Features: features.md
    - Architecture: architecture.md
  - User guide:
    - Templates: templates.md
    - Governance: governance.md
    - Port forwarding: port-forwarding.md
    - Cloning: cloning.md
    - Backup and restore: backup.md
    - Agent mode: agent-mode.md
    - Agent memory: agent-memory.md
  - Reference:
    - CLI: cli.md
    - CLI command reference: cli-reference.md
    - Python SDK: sdk.md
    - API versioning: api-versioning.md
  - Operations:
    - Verifying images: verifying-images.md
    - gVisor sandboxing: gvisor.md
    - Scaling: scaling.md
    - Storage backend: storage.md
    - Performance: performance.md
    - Observability: observability.md
    - Troubleshooting: troubleshooting.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/agenttier/agenttier
